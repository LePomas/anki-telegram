<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2AABEE"/>
      <stop offset="1" stop-color="#1B7FBF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- back card, slightly rotated -->
  <g transform="rotate(-8 512 512)">
    <rect x="242" y="232" width="540" height="560" rx="44" fill="#D7E9F5"/>
  </g>

  <!-- front flashcard -->
  <g transform="rotate(4 512 512)" filter="url(#shadow)">
    <rect x="242" y="232" width="540" height="560" rx="44" fill="#FFFFFF"/>
    <text x="482" y="400" font-family="DejaVu Sans" font-weight="bold" font-size="138"
          text-anchor="middle" fill="#1A1A1A">der</text>
    <text x="482" y="556" font-family="DejaVu Sans" font-weight="bold" font-size="138"
          text-anchor="middle" fill="#DD0000">die</text>
    <text x="482" y="712" font-family="DejaVu Sans" font-weight="bold" font-size="138"
          text-anchor="middle" fill="#F5B800">das</text>
  </g>

  <!-- telegram paper plane badge -->
  <g transform="translate(748 716)">
    <circle cx="0" cy="0" r="102" fill="#FFFFFF" filter="url(#shadow)"/>
    <path transform="translate(-54 -45) scale(4.5)" fill="#2AABEE"
          d="M22.7 1.2 1.6 9.4c-1.4.6-1.4 1.4-.2 1.7l5.4 1.7 2.1 6.3c.3.7.1 1 .8 1 .5 0 .8-.2 1.1-.5l2.6-2.5 5.4 4c1 .5 1.7.3 2-.9l3.5-16.7c.4-1.5-.6-2.2-1.6-1.7zM7.8 12.6l11.8-7.4c.6-.4 1.1-.2.7.2l-10 9.1-.4 4.2z"/>
  </g>
</svg>
